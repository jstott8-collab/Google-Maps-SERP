name: Build Desktop App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: windows-latest
            platform: win

    runs-on: ${{ matrix.os }}

    env:
      NODE_OPTIONS: '--max-old-space-size=4096'
      DATABASE_URL: 'file:./prisma/dev.db'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Python setuptools (macOS)
        if: runner.os == 'macOS'
        run: pip3 install setuptools --break-system-packages || pip3 install setuptools || true

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Create database for build
        run: npx prisma db push --skip-generate --accept-data-loss

      - name: Build Next.js
        run: npx next build

      - name: Copy static assets
        run: node scripts/copy-static.js

      - name: Compile Electron TypeScript
        run: npm run electron:compile

      - name: Rebuild better-sqlite3 for Electron
        run: npx @electron/rebuild -f -w better-sqlite3

      - name: Create empty data/postal directory
        run: node -e "require('fs').mkdirSync('data/postal',{recursive:true})"

      - name: Build Electron app (macOS)
        if: matrix.platform == 'mac'
        run: npx electron-builder --mac --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Ad-hoc sign with "-" identity — no Apple account needed.
          # Prevents "app is damaged" Gatekeeper error on macOS 13+.
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Build Electron app (Windows)
        if: matrix.platform == 'win'
        run: npx electron-builder --win --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Update release notes
        uses: actions/github-script@v7
        with:
          script: |
            const tag = context.ref.replace('refs/tags/', '');
            const { data: releases } = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 20,
            });
            // listReleases returns both published and draft releases for authenticated requests
            const release = releases.find(r => r.tag_name === tag);
            if (release) {
              await github.rest.repos.updateRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: release.id,
                draft: false,
                body: `## Download\n\n| Platform | Download |\n|----------|----------|\n| macOS | [Download DMG](https://github.com/${context.repo.owner}/${context.repo.repo}/releases/download/${tag}/GBP-Rank-Tracker-${tag.replace('v','')}.dmg) |\n| Windows | [Download Installer](https://github.com/${context.repo.owner}/${context.repo.repo}/releases/download/${tag}/GBP-Rank-Tracker-Setup-${tag.replace('v','')}.exe) |\n\n---\n\n${release.body || ''}`,
              });
            } else {
              core.warning(`No release found for tag ${tag} — it may still be uploading. Check GitHub Releases.`);
            }
