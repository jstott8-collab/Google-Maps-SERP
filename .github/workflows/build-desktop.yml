name: Build Desktop App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: windows-latest
            platform: win

    runs-on: ${{ matrix.os }}

    env:
      NODE_OPTIONS: '--max-old-space-size=4096'
      DATABASE_URL: 'file:./prisma/dev.db'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Create database for build
        run: npx prisma db push --skip-generate --accept-data-loss

      - name: Debug environment
        run: |
          node --version
          npx next --version
          echo "DATABASE_URL=$DATABASE_URL"
          ls -la prisma/ || true
          cat next.config.ts

      - name: Build Next.js
        run: npx next build

      - name: Copy static assets
        run: node scripts/copy-static.js

      - name: Compile Electron TypeScript
        run: npm run electron:compile

      - name: Build Electron app (macOS)
        if: matrix.platform == 'mac'
        run: npx electron-builder --mac --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Electron app (Windows)
        if: matrix.platform == 'win'
        run: npx electron-builder --win --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Update release notes
        uses: actions/github-script@v7
        with:
          script: |
            const tag = context.ref.replace('refs/tags/', '');
            const { data: releases } = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            const release = releases.find(r => r.tag_name === tag);
            if (release) {
              await github.rest.repos.updateRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: release.id,
                body: `## Download\n\n| Platform | Download |\n|----------|----------|\n| macOS | [Download DMG](https://github.com/${context.repo.owner}/${context.repo.repo}/releases/download/${tag}/GBP-Rank-Tracker-${tag.replace('v','')}.dmg) |\n| Windows | [Download Installer](https://github.com/${context.repo.owner}/${context.repo.repo}/releases/download/${tag}/GBP-Rank-Tracker-Setup-${tag.replace('v','')}.exe) |\n\n---\n\n${release.body || ''}`,
              });
            }
