appId: com.gbpranktracker.desktop
productName: GBP Rank Tracker

directories:
  output: dist-electron
  buildResources: build-resources

# Skip electron-builder's dependency resolution — we use a manual whitelist
# and rebuild better-sqlite3 ourselves via @electron/rebuild
npmRebuild: false

# Only Electron main-process files + exact dependencies
files:
  - "package.json"
  - "electron/dist/**"
  - "electron/splash.html"
  - "!node_modules/**"
  # electron-updater + better-sqlite3 and all transitive deps
  - "node_modules/argparse/**"
  - "node_modules/base64-js/**"
  - "node_modules/better-sqlite3/**"
  - "node_modules/bindings/**"
  - "node_modules/bl/**"
  - "node_modules/buffer/**"
  - "node_modules/builder-util-runtime/**"
  - "node_modules/chownr/**"
  - "node_modules/debug/**"
  - "node_modules/decompress-response/**"
  - "node_modules/deep-extend/**"
  - "node_modules/detect-libc/**"
  - "node_modules/electron-updater/**"
  - "node_modules/end-of-stream/**"
  - "node_modules/expand-template/**"
  - "node_modules/file-uri-to-path/**"
  - "node_modules/fs-constants/**"
  - "node_modules/fs-extra/**"
  - "node_modules/github-from-package/**"
  - "node_modules/graceful-fs/**"
  - "node_modules/ieee754/**"
  - "node_modules/inherits/**"
  - "node_modules/ini/**"
  - "node_modules/js-yaml/**"
  - "node_modules/jsonfile/**"
  - "node_modules/lazy-val/**"
  - "node_modules/lodash.escaperegexp/**"
  - "node_modules/lodash.isequal/**"
  - "node_modules/mimic-response/**"
  - "node_modules/minimist/**"
  - "node_modules/mkdirp-classic/**"
  - "node_modules/ms/**"
  - "node_modules/napi-build-utils/**"
  - "node_modules/node-abi/**"
  - "node_modules/once/**"
  - "node_modules/prebuild-install/**"
  - "node_modules/pump/**"
  - "node_modules/rc/**"
  - "node_modules/readable-stream/**"
  - "node_modules/safe-buffer/**"
  - "node_modules/sax/**"
  - "node_modules/semver/**"
  - "node_modules/simple-concat/**"
  - "node_modules/simple-get/**"
  - "node_modules/string_decoder/**"
  - "node_modules/strip-json-comments/**"
  - "node_modules/tar-fs/**"
  - "node_modules/tar-stream/**"
  - "node_modules/tiny-typed-emitter/**"
  - "node_modules/tunnel-agent/**"
  - "node_modules/universalify/**"
  - "node_modules/util-deprecate/**"
  - "node_modules/wrappy/**"
  - "!**/*.map"
  - "!**/*.d.ts"
  - "!**/*.d.mts"

# Next.js standalone lives on real filesystem (not in asar)
extraResources:
  - from: ".next/standalone"
    to: "standalone"
    filter:
      - "**/*"
      - "!data/**"
      - "!pleper_chrome_extension/**"
      - "!electron/**"
      - "!response.json"
      - "!tsconfig.json"
      - "!node_modules/playwright/**"
      - "!node_modules/electron/**"
      - "!node_modules/electron-builder/**"
      - "!node_modules/@electron/**"
      - "!node_modules/typescript/**"
      - "!node_modules/prisma/**"
      - "!node_modules/@next/swc-linux-*/**"
      - "!node_modules/@next/swc-win32-*/**"
      - "!node_modules/@next/swc-darwin-*/**"
  - from: ".next/static"
    to: "standalone/.next/static"
  - from: "data/postal"
    to: "data/postal"
    filter:
      - "**/*.json"
  - from: "prisma/schema.prisma"
    to: "prisma/schema.prisma"

asar: true
asarUnpack:
  - "node_modules/better-sqlite3/**"

mac:
  category: public.app-categories.business
  target:
    - target: dmg
  hardenedRuntime: true
  entitlements: build-resources/entitlements.mac.plist
  entitlementsInherit: build-resources/entitlements.mac.plist
  artifactName: "GBP-Rank-Tracker-${version}.${ext}"

win:
  target:
    - target: nsis
      arch:
        - x64

nsis:
  oneClick: true
  perMachine: false
  allowToChangeInstallationDirectory: false
  deleteAppDataOnUninstall: false
  runAfterFinish: true
  artifactName: "GBP-Rank-Tracker-Setup-${version}.${ext}"

linux:
  target:
    - target: AppImage
      arch:
        - x64
  category: Office

publish:
  provider: github
  owner: danishfareed
  repo: Google-Maps-SERP
