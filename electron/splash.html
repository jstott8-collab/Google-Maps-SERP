<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>GBP Rank Tracker</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f8fafc;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      color: #1e293b;
      -webkit-app-region: drag;
    }
    .container {
      text-align: center;
    }
    .icon {
      width: 64px;
      height: 64px;
      background: #2563eb;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
    }
    .icon svg {
      width: 32px;
      height: 32px;
      fill: none;
      stroke: white;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    h1 {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 8px;
      letter-spacing: -0.02em;
    }
    .status {
      font-size: 13px;
      color: #64748b;
      margin-bottom: 24px;
    }
    .loader {
      width: 120px;
      height: 3px;
      background: #e2e8f0;
      border-radius: 3px;
      margin: 0 auto;
      overflow: hidden;
    }
    .loader-bar {
      width: 40%;
      height: 100%;
      background: #2563eb;
      border-radius: 3px;
      animation: slide 1.2s ease-in-out infinite;
    }
    @keyframes slide {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(350%); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">
      <svg viewBox="0 0 24 24">
        <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
        <circle cx="12" cy="10" r="3"/>
      </svg>
    </div>
    <h1>GBP Rank Tracker</h1>
    <p class="status" id="status">Starting up...</p>
    <div class="loader">
      <div class="loader-bar"></div>
    </div>
  </div>
</body>
</html>
